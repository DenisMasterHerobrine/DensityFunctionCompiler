plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.141'
}

version = mod_version
group = mod_group_id

repositories {
    mavenLocal()
    mavenCentral()
    // MixinSquared
    maven { url = 'https://maven.bawnorton.com/releases' }
    // Forgified Fabric API (Connector): MultiNoiseSamplerHooks, fabric-biome mixins
    maven { url = 'https://maven.su5ed.dev/releases' }
}

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers.add('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id

            // To enable the DFC vanilla-vs-JIT parity sweep at startup (logs any field
            // whose compiled output diverges from vanilla beyond 1e-6 ULPs), pass:
            //   ./gradlew runClient -Ddfc.parity=true
            // or temporarily uncomment:
            // systemProperty 'dfc.parity', 'true'
        }

        // DFC vector API (jdk.incubator.vector). Use: ./gradlew runClientVector
        clientVector {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            jvmArgument '--add-modules=jdk.incubator.vector'
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            // Same opt-in `dfc.parity` knob as the client run; uncomment to verify
            // worldgen vs. vanilla after a codegen change:
            systemProperty 'dfc.parity', 'true'
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // mostly optional in a single mod project
        // but multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }

    // Optional JFR: ./gradlew runServer -Pjfr
    // Default 7m window (join + load chunks) then the recording file is written; JVM keeps running.
    // Shorter: -PjfrDurationSec=90   Longer: -PjfrDurationSec=600
    if (project.hasProperty('jfr')) {
        def jfrFile = file("${buildDir}/profiles/dfc-jvm.jfr")
        jfrFile.parentFile.mkdirs()
        def p = jfrFile.absolutePath.replace('\\', '/')
        def sec = (project.findProperty('jfrDurationSec')?.toString() ?: '420') as int
        runs.configureEach { run ->
            jvmArgument "-XX:StartFlightRecording:filename=${p},duration=${sec}s,settings=profile,maxsize=500M"
        }
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }


dependencies {
    implementation project(':dfc-natives')
    // Ship dfc-natives as Jar-in-Jar (FML embeds it); keep implementation for compile + IDE runs.
    jarJar project(':dfc-natives')
    // 1.21.1 dev runs: JiJ libraries need explicit runtime classpath unless they are mods / FMLModType LIBRARY in manifest.
    additionalRuntimeClasspath project(':dfc-natives')

    // MixinSquared: @TargetHandler and related AP; runtime via JiJ (mixinsquared-neoforge)
    def ms = findProperty('mixinsquared_version') ?: '0.3.7-beta.1'
    compileOnly "com.github.bawnorton.mixinsquared:mixinsquared-common:${ms}"
    annotationProcessor "com.github.bawnorton.mixinsquared:mixinsquared-common:${ms}"

    // Bundled in our jar so MixinSquared init + APIs are available without a separate mod install
    jarJar(implementation("com.github.bawnorton.mixinsquared:mixinsquared-neoforge:${ms}")) {
        version {
            strictly '[0.3.7-beta.1,)'
            prefer "${ms}"
        }
    }

    // ASM is already on NeoForge's module path (Mixin, SRG remapper, etc.). Bundling or
    // jarJar-in another copy causes ResolutionException: "reads more than one module named
    // org.objectweb.asm" outside userdev. Compile against the loader's ASM only (no JIJ).
    def asmVersion = "9.8"
    compileOnly "org.ow2.asm:asm:${asmVersion}"
    compileOnly "org.ow2.asm:asm-tree:${asmVersion}"
    compileOnly "org.ow2.asm:asm-util:${asmVersion}"

    // Forgified Fabric API (Sinytra)
    compileOnly "org.sinytra.forgified-fabric-api:forgified-fabric-api:0.116.7+2.2.0+1.21.1"
}

tasks.named('jar', Jar) {
    dependsOn project(':dfc-natives').tasks.named('jar')
}

// NeoForge run configs must see an up-to-date dfc-natives jar (with META-INF/natives) on the classpath.
gradle.projectsEvaluated {
    def nativesJar = rootProject.project(':dfc-natives').tasks.named('jar')
    ['runClient', 'runServer', 'runClientVector', 'prepareRunClient', 'prepareRunServer'].each { tn ->
        def t = rootProject.tasks.findByName(tn)
        if (t != null) {
            t.dependsOn nativesJar
        }
    }
}

/**
 * One-shot build: universal native bundle (host CMake + prebuilts under :dfc-natives/prebuilts) and mod jar with JiJ.
 * Use: -Pdfc.buildNatives=true and optionally -Pdfc.requireAllNatives=true for release builds.
 */
tasks.register('dfcBuildWithNatives') {
    group = 'build'
    description = 'Build :dfc-natives (universal META-INF/natives) and the main mod jar (dfc-natives Jar-in-Jar).'
    dependsOn 'jar'
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [minecraft_version      : minecraft_version,
                             minecraft_version_range: minecraft_version_range,
                             neo_version            : neo_version,
                             neo_version_range      : neo_version_range,
                             loader_version_range   : loader_version_range,
                             mod_id                 : mod_id,
                             mod_name               : mod_name,
                             mod_license            : mod_license,
                             mod_version            : mod_version,
                             mod_authors            : mod_authors,
                             mod_description        : mod_description]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
